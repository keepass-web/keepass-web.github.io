<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeePass Web</title>
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

main {
  max-width: 560px;
  width: 100%;
  text-align: center;
}

.wordmark {
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2rem;
}

h1 {
  font-size: 2.25rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 1.25rem;
}

p {
  color: var(--muted);
  margin-bottom: 2rem;
}

.badge {
  display: inline-block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2rem;
  padding: 0.35rem 1rem;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 2.5rem;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  align-items: center;
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

footer {
  margin-top: 4rem;
  font-size: 0.8rem;
  color: var(--border);
}

</style>
</head>
<body>
  <main>
    <div class="wordmark">KeePass Web</div>
    <h1>Your passwords.<br>Your storage.<br>Your browser.</h1>
    <p>
      A KDBX password manager that runs entirely in your browser:
      no installation, no servers, no secrets leaving your machine.
    </p>
    <div class="badge">Coming soon</div>
    <div class="links">
      <a href="https://github.com/keepass-web">Follow development on GitHub</a>
      <a href="https://github.com/sponsors/keepass-web">Become a GitHub Sponsor</a>
    </div>
  </main>
  <footer>MIT licensed &middot; <a href="https://github.com/keepass-web">github.com/keepass-web</a></footer>
  <script>

</script>
</body>
</html>
